# This workflow will do a clean install of node dependencies, build the source code and run tests across different versions of node
# For more information see: https://help.github.com/actions/language-and-framework-guides/using-nodejs-with-github-actions

name: Unit tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  client-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Setup npm
        uses: pnpm/action-setup@v2
        with:
          version: 8
      - name: Setup node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: 'pnpm'
      - name: Install
        run: pnpm install
      #- name: Build (angular)
      #  run: pnpm run build
      - name: Test
        run: pnpm run test --coverage
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: client-coverage-report
          path: client/coverage/clover.xml

  server-unit-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - name: Cache Composer dependencies
        uses: actions/cache@v3
        with:
          path: /tmp/composer-cache
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
      - name: Install Composer Dependencies
        uses: php-actions/composer@v6
        with:
          php_version: '8.2'
          php_extensions: xml gd xdebug
          dev: yes
          args: --profile --ignore-platform-reqs --working-dir=server
      - run: php -v
      # show loaded extensions
      - run: export XDEBUG_MODE=coverage 
      - run: php -r "print_r(get_loaded_extensions());"
      - run: php -r "print_r(xdebug_info());"
      - name: Test with pest and coverage
        run: XDEBUG_MODE=coverage ./vendor/bin/pest --coverage --coverage-text --coverage-clover=coverage/clover.xml
        env:
          XDEBUG_MODE: coverage
      - name: Display structure of generated files
        run: ls -R | grep coverage
      - name: Upload Coverage Report
        uses: actions/upload-artifact@v3
        with:
          name: server-coverage-report
          path: server/coverage/clover.xml

  aggregate:
    runs-on: ubuntu-latest
    needs: [client-unit-tests, server-unit-tests]
    steps:
      # - uses: actions/checkout@v3
      - uses: actions/download-artifact@v3
      - name: Display structure of downloaded files
        run: ls -R
      - name: Coverage Report as Comment (Clover)
        uses: lucassabreu/comment-coverage-clover@main
        with:
          file: client-coverage-report/clover.xml
      - name: Code Coverage Summary Report
        uses: saschanowak/CloverCodeCoverageSummary@0.4.0
        with:
          filename: '**/clover.xml'
      - name: 'Add Code Coverage Summary as PR Comment'
        uses: marocchino/sticky-pull-request-comment@v2
        if: github.event_name == 'pull_request'
        with:
          recreate: true
          path: code-coverage-summary.md
